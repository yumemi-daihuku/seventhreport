<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERMINAL — アクセス制限</title>
  <style>
    :root {
      --bg:      #000;
      --green:   #00ff41;
      --green-d: #003b10;
      --green-m: #00802a;
      --red:     #ff2b2b;
      --amber:   #ffb300;
      --dim:     #004d15;
      --font:    'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--green);
      font-family: var(--font);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 2px, rgba(0,0,0,0.25) 2px, rgba(0,0,0,0.25) 4px);
      pointer-events: none; z-index: 100;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.9) 100%);
      pointer-events: none; z-index: 99;
    }
    .terminal {
      width: 100%; max-width: 720px;
      border: 1px solid var(--green-m);
      box-shadow: 0 0 40px rgba(0,255,65,0.07);
      position: relative; z-index: 1;
    }
    .titlebar {
      background: var(--green-d); border-bottom: 1px solid var(--green-m);
      padding: 8px 16px; display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 2px;
    }
    .btn { width: 10px; height: 10px; border-radius: 50%; }
    .btn-r { background: var(--red); }
    .btn-y { background: var(--amber); }
    .btn-g { background: var(--green); animation: blink 2s infinite; }
    .screen {
      padding: 28px 32px; min-height: 400px;
      background: rgba(0,5,0,0.97);
      font-size: 14px; line-height: 2;
    }
    .log { margin-bottom: 2px; opacity: 0; transform: translateY(3px); animation: fi 0.3s ease forwards; }
    .ok   { color: var(--green); }
    .err  { color: var(--red); }
    .warn { color: var(--amber); }
    .sys  { color: #444; font-size: 12px; }
    .dim  { color: var(--dim); }
    @keyframes fi { to { opacity:1; transform:translateY(0); } }
    .prog { height: 2px; background: var(--green-d); overflow: hidden; }
    .prog::after {
      content: ''; display: block; height: 100%;
      background: var(--green); animation: prog 2s linear forwards;
    }
    @keyframes prog { from{width:0} to{width:100%} }
    .prompt { display: flex; align-items: center; gap: 10px; margin-top: 24px; }
    .prompt-sign { color: var(--green); font-size: 16px; }
    #code-input {
      background: transparent; border: none;
      border-bottom: 1px solid var(--green-m);
      color: var(--green); font-family: var(--font);
      font-size: 14px; letter-spacing: 6px;
      width: 160px; outline: none; caret-color: var(--green);
    }
    .submit-btn {
      background: transparent; border: 1px solid var(--green-m);
      color: var(--green); font-family: var(--font);
      font-size: 12px; padding: 5px 16px; letter-spacing: 2px; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover { background: var(--green-d); box-shadow: 0 0 10px rgba(0,255,65,0.2); }
    .overlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      font-size: clamp(18px, 4vw, 28px);
      letter-spacing: 6px; font-weight: bold; z-index: 10;
    }
    .overlay.ok  { background: rgba(0,8,0,0.93); color: var(--green); text-shadow: 0 0 20px var(--green); animation: pop 0.4s ease; }
    .overlay.ng  { background: rgba(10,0,0,0.93); color: var(--red); text-shadow: 0 0 20px var(--red); animation: shk 0.4s ease; }
    @keyframes pop { from{opacity:0;transform:scale(1.06)} to{opacity:1;transform:scale(1)} }
    @keyframes shk { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
  </style>
</head>
<body>

<script>
  window.HORROR_CONFIG = {
    blackoutMsg: 'そうだ、認証しろ。\n扉の向こうに、答えがある。',
    blackoutDelay: 60000,
    leaveMessages: {
      unsolved: ['待て。扉はまだ開いていない。', '……戻れ。コードを入力しろ。'],
      solved:   ['次へ進め。もうすぐだ。', '……そうだ、正しい。'],
    },
    tabMessages: {
      unsolved: ['……戻ってきたか。続きをやれ。', 'コードを入力すれば開く。'],
      solved:   ['次の扉が待っている。', '……進め。'],
    },
  };
</script>

<div class="terminal" id="terminal">
  <div class="titlebar">
    <div class="btn btn-r"></div>
    <div class="btn btn-y"></div>
    <div class="btn btn-g"></div>
    <span style="margin-left:12px">SECURE_TERMINAL v2.1 — ██████ NODE</span>
  </div>
  <div class="prog"></div>
  <div class="screen" id="screen"></div>
  <div class="overlay ok" id="ov-ok">▶ ACCESS GRANTED</div>
  <div class="overlay ng" id="ov-ng">✕ ACCESS DENIED</div>
</div>

<script src="horror.js"></script>

<script>
  const CONFIG = {
    CORRECT_CODE: '945',
    NEXT_PAGE:    'archive.html',
  };
  const BOOT = [
    { text: 'システム起動中…',             cls: 'dim',  ms: 200  },
    { text: 'セキュリティモジュール: OK',   cls: 'ok',   ms: 700  },
    { text: 'ネットワーク: 接続確立',       cls: 'ok',   ms: 1050 },
    { text: '不正アクセス試行: 検出 [3件]', cls: 'warn', ms: 1450 },
    { text: '─────────────────────────────', cls: 'sys', ms: 1800 },
    { text: '端末認証システム v2.1',        cls: 'sys',  ms: 2000 },
    { text: '─────────────────────────────', cls: 'sys', ms: 2100 },
    { text: 'このシステムへのアクセスには', cls: 'ok',   ms: 2500 },
    { text: '認証コードが必要です。',       cls: 'ok',   ms: 2800 },
    { text: '─────────────────────────────', cls: 'sys', ms: 3100 },
  ];
  const screen = document.getElementById('screen');

  function addLog(text, cls) {
    const el = document.createElement('div');
    el.className = `log ${cls}`;
    el.textContent = text;
    screen.appendChild(el);
    screen.scrollTop = screen.scrollHeight;
  }

  function showPrompt() {
    const row = document.createElement('div');
    row.className = 'prompt';
    row.innerHTML = `
      <span class="prompt-sign">&gt;_</span>
      <input id="code-input" type="text" maxlength="10"
             placeholder="CODE" autocomplete="off" spellcheck="false">
      <button class="submit-btn" onclick="check()">ENTER</button>
    `;
    screen.appendChild(row);
    screen.scrollTop = screen.scrollHeight;
    const inp = document.getElementById('code-input');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
  }

  BOOT.forEach(({ text, cls, ms }) => setTimeout(() => addLog(text, cls), ms));
  setTimeout(showPrompt, 3300);

  // 煽りセリフ（失敗回数順）——間違いを指摘しつつ正解に誘導する
  const TAUNTS = [
    'ちがう。……もう一度やれ。',
    'まだちがう。報告書をよく読んだか。',
    '何度やっても同じだ。……ヒントをやろう。',
    'そこではない。落ち着いて考えろ。',
  ];

  let fails = 0;
  function check() {
    const inp = document.getElementById('code-input');
    if (!inp) return;
    const val = inp.value.trim();
    addLog('> ' + val, 'ok');
    inp.value = ''; inp.disabled = true;

    if (val === CONFIG.CORRECT_CODE) {
      document.getElementById('ov-ok').style.display = 'flex';
      setTimeout(() => addLog('認証成功。', 'ok'), 300);
      setTimeout(() => addLog('次のセクションへアクセスを許可します。', 'ok'), 600);
      // 解決済み状態に移行
      window.horrorSetState('solved');
      setTimeout(() => { window.location.href = CONFIG.NEXT_PAGE; }, 2400);
    } else {
      fails++;
      document.getElementById('ov-ng').style.display = 'flex';
      setTimeout(() => {
        document.getElementById('ov-ng').style.display = 'none';
        const taunt = TAUNTS[Math.min(fails - 1, TAUNTS.length - 1)];
        addLog(taunt, 'err');
        // 失敗メッセージを画面下にも表示
        window.horrorShowBottom(taunt);
        // 3回失敗でヒント
        if (fails >= 3) {
          const hint = '……報告書に数字が散らばっている。それらを掛け合わせれば開く。';
          addLog(hint, 'warn');
          window.horrorShowBottom(hint, 5000);
        }
        inp.disabled = false; inp.focus();
      }, 1200);
    }
  }
</script>
</body>
</html>
