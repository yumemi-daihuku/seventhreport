<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>— 終 —</title>
  <style>
    :root {
      --bg:     #000;
      --red:    #c0392b;
      --red-b:  #ff2b2b;
      --text:   #cccccc;
      --dim:    #333;
      --font:   'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* ─── CRTオーバーレイ ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.25) 2px, rgba(0,0,0,0.25) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ─── 血痕風テクスチャ（極めて薄く） ─── */
    .bg-splatter {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(192,57,43,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 70%, rgba(192,57,43,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── コンテンツ ─── */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 640px;
    }

    /* ─── クリアスタンプ ─── */
    .stamp {
      border: 3px solid var(--red);
      display: inline-block;
      padding: 12px 32px;
      margin-bottom: 48px;
      transform: rotate(-3deg);
      position: relative;
      opacity: 0;
      animation: stamp-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards;
    }

    .stamp::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(192,57,43,0.3);
    }

    .stamp-text {
      color: var(--red);
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 8px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(192,57,43,0.4);
    }

    /* ─── タイトル ─── */
    .end-title {
      font-size: clamp(14px, 2.5vw, 18px);
      letter-spacing: 6px;
      color: var(--dim);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadein 1s ease 1s forwards;
    }

    /* ─── 本文 ─── */
    .end-body {
      line-height: 2.4;
      font-size: 14px;
      color: var(--text);
      opacity: 0;
      animation: fadein 1s ease 1.5s forwards;
      text-align: left;
      border-left: 2px solid var(--dim);
      padding-left: 24px;
      margin-bottom: 48px;
    }

    .end-body p { margin-bottom: 16px; }

    /* ─── クレジット ─── */
    .credits {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--dim);
      opacity: 0;
      animation: fadein 1s ease 2.5s forwards;
      line-height: 2;
      margin-bottom: 32px;
    }

    /* ─── リスタートリンク ─── */
    .restart {
      display: inline-block;
      color: var(--dim);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 3px;
      border-bottom: 1px solid var(--dim);
      padding-bottom: 2px;
      opacity: 0;
      animation: fadein 1s ease 3s forwards;
      transition: color 0.2s, border-color 0.2s;
    }

    .restart:hover { color: var(--text); border-color: var(--text); }

    /* ─── アニメーション ─── */
    @keyframes stamp-in {
      from { opacity: 0; transform: rotate(-3deg) scale(2); }
      to   { opacity: 1; transform: rotate(-3deg) scale(1); }
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-splatter"></div>

<div class="content">

  <!-- ─── スタンプ ─── -->
  <div class="stamp">
    <div class="stamp-text">解明</div>
  </div>

  <!-- ─── タイトル ─── -->
  <div class="end-title">— すべての謎は解かれた —</div>

  <!-- ─── エンディング本文 ─── -->
  <div class="end-body">
    <p>
      ここにエンディングのストーリーを書いてください。
    </p>
    <p>
      調査員はすべてを知った。<br>
      しかし、知ることが必ずしも救いになるとは限らない。
    </p>
    <p style="color:var(--dim)">
      ← このテキストは自由に書き換えられます。
    </p>
  </div>

  <!-- ─── クレジット ─── -->
  <div class="credits">
    <div>CREATED BY &nbsp;[あなたの名前]</div>
    <div>SCENARIO BY &nbsp;[あなたの名前]</div>
    <div style="margin-top:8px; font-size:10px; color:#222;">
      ── プレイしてくれてありがとうございました ──
    </div>
  </div>

  <!-- ─── リスタート ─── -->
  <a href="index.html" class="restart">▸ 最初から読み直す</a>

</div>

</body>
</html>
