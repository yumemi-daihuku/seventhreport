<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FILE: ARC-███-0001 — 第一回聴取記録</title>
  <style>
    :root {
      --bg:     #06060a;
      --sur:    #0d0d15;
      --border: #1e1e2e;
      --purple: #7b2fff;
      --pur-d:  #2a0a5e;
      --red:    #ff3333;
      --red-d:  #c0392b;
      --amber:  #ffb300;
      --text:   #b8b8d0;
      --dim:    #3a3a5a;
      --green:  #00ff41;
      --font:   'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100vh;
      display: grid; grid-template-rows: auto 1fr; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 999;
    }

    /* ─── ヘッダー ─── */
    header {
      background: var(--sur); border-bottom: 1px solid var(--border);
      padding: 14px 32px; display: flex; align-items: center;
      justify-content: space-between; font-size: 11px; letter-spacing: 2px; color: var(--dim);
    }
    .h-title { color: var(--purple); font-size: 13px; letter-spacing: 3px; }
    .badge {
      border: 1px solid var(--green); color: var(--green);
      padding: 3px 10px; font-size: 10px; letter-spacing: 2px;
    }

    /* ─── メイン ─── */
    main { display: flex; align-items: flex-start; justify-content: center; padding: 48px 24px 80px; }
    .box { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 24px; }

    /* ─── ファイルカード ─── */
    .file-card {
      border: 1px solid var(--border); border-left: 3px solid var(--purple);
      padding: 24px 28px; background: var(--sur);
    }
    .f-meta { font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-bottom: 14px; }
    .f-name { color: var(--text); font-size: 15px; letter-spacing: 2px; margin-bottom: 10px; }
    .f-desc { font-size: 12px; color: var(--dim); line-height: 1.8; margin-bottom: 20px; }

    /* ─── 聴取記録本文 ─── */
    .transcript {
      font-size: 13px; line-height: 2.4; color: var(--text);
    }
    .transcript br { display: block; content: ''; margin-bottom: 0; }

    /* タイプライター演出：行ごとに遅延フェードイン */
    .line {
      display: block;
      opacity: 0;
      transform: translateY(4px);
      animation: linein 0.5s ease forwards;
    }
    .line.gap { margin-top: 16px; }

    /* 最後の一文だけ赤で強調 */
    .line.final {
      color: var(--red);
      text-shadow: 0 0 10px rgba(255,51,51,0.3);
      margin-top: 8px;
    }

    /* ─── フッター ─── */
    .foot {
      font-size: 10px; letter-spacing: 2px; color: var(--dim);
      text-align: center; padding-top: 16px;
      border-top: 1px dashed var(--border);
      opacity: 0; animation: linein 0.5s ease forwards;
    }

    /* ─── クレジット ─── */
    .credits {
      font-size: 11px; letter-spacing: 2px; color: var(--dim);
      line-height: 2; text-align: center;
      opacity: 0; animation: linein 0.5s ease forwards;
    }

    .restart {
      display: inline-block; color: var(--dim); text-decoration: none;
      font-size: 11px; letter-spacing: 3px;
      border-bottom: 1px solid var(--dim); padding-bottom: 2px;
      opacity: 0; animation: linein 0.5s ease forwards;
      transition: color 0.2s, border-color 0.2s;
      text-align: center;
    }
    .restart:hover { color: var(--text); border-color: var(--text); }
    .center { text-align: center; }

    @keyframes linein {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <span class="h-title">ARCHIVE SYSTEM — RECORD</span>
  <span>FILE: ARC-███-0001</span>
  <div class="badge">▶ 復号済み</div>
</header>

<main>
  <div class="box">

    <div class="file-card">
      <div class="f-meta">FILE_ID: ARC-███-0001 &nbsp;|&nbsp; CLASS: EYES_ONLY &nbsp;|&nbsp; 第一回聴取記録</div>
      <div class="f-name">朝倉 誠 — 第一回聴取記録</div>
      <div class="f-desc">
        ※ 本記録は朝倉 誠の失踪前、初回接触から3日後に実施された聴取である。<br>
        ※ 朝倉はこの聴取の翌週に失踪。以降、消息不明。
      </div>

      <!-- 聴取本文：各行をJSで遅延表示 -->
      <div class="transcript" id="transcript"></div>
    </div>

    <div class="foot" id="foot" style="animation-delay:999s;">
      このファイルへのアクセスは記録されました。
    </div>

    <div class="credits" id="credits" style="animation-delay:999s;">
      <div>CREATED BY &nbsp;[あなたの名前]</div>
      <div>SCENARIO BY &nbsp;[あなたの名前]</div>
      <div style="margin-top:8px; font-size:10px; color:#1a1a1a;">── プレイしてくれてありがとうございました ──</div>
    </div>

    <div class="center">
      <a href="index.html" class="restart" id="restart" style="animation-delay:999s;">▸ 最初から読み直す</a>
    </div>

  </div>
</main>

<script src="horror.js"></script>

<script>
'use strict';

// ─── ブラウザバック封鎖（強化版） ───────────────────────────────
// 複数のダミー履歴を積んでおき、popstate発火のたびに再度積み直す
// これにより何度戻ろうとしても end.html に留まり続ける
(function lockHistory() {
  // 初回：ダミー履歴を5枚積んでバッファを作る
  for (let i = 0; i < 5; i++) {
    history.pushState({ locked: true }, '', location.href);
  }

  window.addEventListener('popstate', function onPop(e) {
    // 即座に再push（連打されても追いつく）
    history.pushState({ locked: true }, '', location.href);

    // 演出：戻ろうとしたらシェイク（封印後なのでrawFlashで直接叩く）
    const f = document.getElementById('h-flash');
    if (f) {
      f.classList.remove('on', 'fade');
      void f.offsetWidth;
      f.classList.add('on');
      setTimeout(() => { f.classList.remove('on'); f.classList.add('fade'); }, 80);
      setTimeout(() => f.classList.remove('fade'), 600);
    }
  });
})();

// ─── 聴取テキスト定義 ────────────────────────────────────────────
const LINES = [
  { text: '調査員：本日はお時間をいただきありがとうございます。' },
  { text: '調査員：まず、異変に気づいたのはいつ頃のことですか。' },
  { text: '朝倉：……3日前、です。夜中に。', gap: true },
  { text: '調査員：具体的にどのような異変でしたか。' },
  { text: '朝倉：画面の中に、何かがいた。最初は気のせいだと思ったんですけど。', gap: true },
  { text: '調査員：気のせいではないと感じたのはなぜですか。' },
  { text: '朝倉：……目が合ったので。', gap: true },
  { text: '調査員：その後、日常生活に支障はありましたか。' },
  { text: '朝倉：鏡が、怖くなりました。自分じゃないものが映る気がして。', gap: true },
  { text: '朝倉：夢もよく見ます。暗い場所にいる夢。でも暗くはないんです。', gap: true },
  { text: '調査員：暗くはない、というのは？' },
  { text: '朝倉：なんというか……光はないのに、見える。そういう場所。', gap: true },
  { text: '調査員：わかりました。最後に一点だけ確認させてください。' },
  { text: '調査員：どういったサイトを見て、異変が起きたんですか。', gap: true },
  { text: '朝倉：えーっと……名前は……', gap: true },
  { text: '朝倉：「第七報告書　─　未分類事案」', final: true },
];

// ─── キャラクター独白テキスト（赤フラッシュ後に順番に表示） ──────
const MONOLOGUE = [
  'そうだ。全部、俺がやった。',
  'このサイトを作ったのも。',
  '朝倉を、西野を、荒木を、流田を、結城を——引き込んだのも。',
  'お前たちに「続きを読め」と言い続けたのも。',
  '……全部、俺だ。',
  'お前も、もう同じだ。',
  'ここに来た時点で、終わっていた。',
];

// ─── 遅延表示 ────────────────────────────────────────────────────
const BASE_DELAY    = 1000;  // 最初の行が出るまでの初期遅延(ms)
const LINE_INTERVAL = 1100;  // 行と行の間隔(ms)
const GAP_EXTRA     = 400;   // gap行の追加遅延(ms)

const container = document.getElementById('transcript');
let totalDelay = BASE_DELAY;

LINES.forEach((line, i) => {
  const span = document.createElement('span');
  span.className = 'line' +
    (line.gap   ? ' gap'   : '') +
    (line.final ? ' final' : '');
  span.textContent = line.text;
  span.style.animationDelay = totalDelay + 'ms';
  container.appendChild(span);

  totalDelay += LINE_INTERVAL;
  if (line.gap) totalDelay += GAP_EXTRA;
});

// ─── 赤フラッシュ直接実行（_silencedをバイパス）────────────────
function rawFlash() {
  const f = document.getElementById('h-flash');
  if (!f) return;
  f.classList.remove('on', 'fade');
  void f.offsetWidth;
  f.classList.add('on');
  setTimeout(() => { f.classList.remove('on'); f.classList.add('fade'); }, 80);
  setTimeout(() => f.classList.remove('fade'), 600);
}

// ─── 画面下メッセージ直接表示（_silencedをバイパス）────────────
function rawBottom(msg, duration = 2600) {
  const el = document.getElementById('h-bottom');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), duration);
}

// ─── 最後の行（final）が表示された後の演出 ───────────────────────
const FINAL_LINE_DELAY = totalDelay;

// step1: 赤フラッシュ×3回の直前にhorrorSilenceで全演出を封印
setTimeout(() => {
  if (window.horrorSilence) window.horrorSilence();
}, FINAL_LINE_DELAY + 500);

// step2: 赤フラッシュ×3回
const FLASH_INTERVAL = 500;
for (let i = 0; i < 3; i++) {
  setTimeout(() => rawFlash(), FINAL_LINE_DELAY + 600 + i * FLASH_INTERVAL);
}

// step3: キャラクター独白を画面下に順番に表示（rawBottomでバイパス）
const MONO_START    = FINAL_LINE_DELAY + 600 + 3 * FLASH_INTERVAL + 800;
const MONO_INTERVAL = 2800;

MONOLOGUE.forEach((text, i) => {
  setTimeout(() => rawBottom(text, MONO_INTERVAL - 200), MONO_START + i * MONO_INTERVAL);
});

// step4: 独白が全部終わったら永続封印
const SEAL_DELAY = MONO_START + MONOLOGUE.length * MONO_INTERVAL + 300;
setTimeout(() => {
  if (window.horrorSealForever) window.horrorSealForever();
}, SEAL_DELAY);

// step5: フッター・クレジット・リスタートを独白後に表示
const afterDelay = SEAL_DELAY + 1200;
['foot', 'credits', 'restart'].forEach((id, idx) => {
  const el = document.getElementById(id);
  if (el) el.style.animationDelay = (afterDelay + idx * 500) + 'ms';
});
</script>

</body>
</html>
